commit-msg:
  commands:
    commitlint:
      run: bun commitlint --edit $1

post-merge:
  commands:
    pnpm:
      glob: "{package.json,pnpm-lock.yaml}"
      run: bun install

postinstall:
  parallel: true
  commands:
    frontend:
      run: bun theme --out apps/frontend/node_modules/@yamada-ui/core
    ui:
      run: bun theme --out packages/ui/node_modules/@yamada-ui/core

pre-commit:
  parallel: true
  exclude:
    - "apps/portal/**"
    - "bun.lock"
    - "**/importMap.js"
    - "**/payload-types.ts"
  commands:
    biome:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: |
        bun biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true
    cspell:
      glob: "*.{ts,tsx,js,jsx,cjs,mjs,json,md,mdx,css,scss,yaml,yml}"
      run: |
        bun cspell {staged_files} --cache --cache-strategy=content --cache-location=.cspellcache